name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["dev", "main"]
  workflow_dispatch:
  
jobs:
  backend-java-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, portfolio-service, config-server, analytics-server, notification-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with: 
          lfs: true

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Run tests
        run: |
          cd backend/${{ matrix.service }}
          ./mvnw test

  backend-python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ai-service, mcp-server]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with: 
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd backend/${{ matrix.service }}
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          cd backend/${{ matrix.service }}
          export PYTHONPATH=$PWD
          pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with: 
          lfs: true
          
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install deps
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

