name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, portfolio-service, config-server, analytics-server]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with: 
          lfs: true

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run backend tests
        run: |
          cd backend/${{ matrix.service }}
          ./mvnw test -DskipITs

      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ github.actor }}/${{ matrix.service }}:latest backend/${{ matrix.service }}

      - name: Push backend image
        run: |
          docker push ghcr.io/${{ github.actor }}/${{ matrix.service }}:latest

  frontend-build:
    runs-on: ubuntu-latest
    needs: backend-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with: 
          lfs: true
          
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build frontend image
        run: |
          docker build -t ghcr.io/${{ github.actor }}/portfolio-frontend:latest frontend

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ github.actor }}/portfolio-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - name: Deploy
        run: |
          echo "Deploying..."

