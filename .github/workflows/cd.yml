name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  java-backend-build:
    runs-on: [self-hosted, linux, arm64]
    strategy:
      matrix:
        service: [api-gateway, portfolio-service, config-server, analytics-server, notification-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with: 
          lfs: true

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push ARM64 Image
        uses: docker/build-push-action@v5
        with:
          context: backend/${{ matrix.service }}
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.actor }}/${{ matrix.service }}:latest
  
  python-backend-build:
    runs-on: [self-hosted, linux, arm64]
    strategy:
      matrix:
        service: [ai-service, mcp-server]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with: 
          lfs: true

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push ARM64 Image
        uses: docker/build-push-action@v5
        with:
          context: backend/${{ matrix.service }}
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.actor }}/${{ matrix.service }}:latest

  frontend-build:
    runs-on: [self-hosted, linux, arm64]
    needs: [java-backend-build, python-backend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with: 
          lfs: true

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push ARM64 Image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.actor }}/portfolio-frontend:latest

  deploy:
    runs-on: [self-hosted, linux, arm64]
    needs: frontend-build

    steps:
      - name: Deploy
        run: |
          echo "Deploying..."

