name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  java-backend-build:
    runs-on: [self-hosted, linux, arm64]
    strategy:
      matrix:
        service: [api-gateway, portfolio-service, config-server, analytics-server]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with: 
          lfs: true

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run backend tests
        run: |
          cd backend/${{ matrix.service }}
          ./mvnw test -DskipITs

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Multi-Arch Image
        uses: docker/build-push-action@v5
        with:
          context: backend/${{ matrix.service }}
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.actor }}/${{ matrix.service }}:latest
  
  python-backend-build:
    runs-on: [self-hosted, linux, arm64]
    strategy:
      matrix:
        service: [ai-service, mcp-server]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with: 
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd backend/${{ matrix.service }}
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run pytest
        run: |
          cd backend/${{ matrix.service }}
          export PYTHONPATH=$PWD
          pytest -q

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Multi-Arch Image
        uses: docker/build-push-action@v5
        with:
          context: backend/${{ matrix.service }}
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.actor }}/${{ matrix.service }}:latest

  frontend-build:
    runs-on: [self-hosted, linux, arm64]
    needs: [java-backend-build, python-backend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with: 
          lfs: true
          
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Multi-Arch Image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.actor }}/portfolio-frontend:latest

  deploy:
    runs-on: [self-hosted, linux, arm64]
    needs: frontend-build

    steps:
      - name: Deploy
        run: |
          echo "Deploying..."

