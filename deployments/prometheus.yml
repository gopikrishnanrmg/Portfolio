global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'actuator'
    metrics_path: '/actuator/prometheus'
    consul_sd_configs:
      - server: 'http://consul:8500'
        services: ['config-server', 'api-gateway', 'portfolio-service', 'analytics-server', 'ai-service']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'consul'
    metrics_path: '/v1/agent/metrics'
    static_configs:
      - targets: ['consul:8500']
