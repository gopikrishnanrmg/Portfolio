groups:
- name: springboot-alerts
  rules:
  - alert: HighErrorRate
    expr: rate(http_server_requests_seconds_count{outcome="SERVER_ERROR"}[5m]) > 5
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "High error rate in Spring Boot app"
      description: "Spring Boot app has >5 errors per second for 5 minutes."

  - alert: HighLatency
    expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le)) > 2
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High latency in Spring Boot app"
      description: "95th percentile request latency > 2s for 5 minutes."

- name: postgres-alerts
  rules:
  - alert: TooManyConnections
    expr: pg_stat_activity_count > 100
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Postgres connections too high"
      description: "Postgres has more than 100 active connections."

- name: node-alerts
  rules:
  - alert: HighCPUUsage
    expr: rate(node_cpu_seconds_total{mode="user"}[5m]) > 0.9
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High CPU usage detected"
      description: "CPU usage has been above 90% for more than 5 minutes."

  - alert: LowDiskSpace
    expr: node_filesystem_avail_bytes{mountpoint="/"} < 5e9
    for: 10m
    labels:
      severity: critical
    annotations:
      summary: "Low disk space"
      description: "Root filesystem has less than 5GB available."
