server {
    listen 80;
    server_name api.gopikrishnanrmg.uk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.gopikrishnanrmg.uk;

    ssl_certificate /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    location / {
        proxy_pass http://api-gateway:8887;
    }
}

