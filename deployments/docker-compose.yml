services:
  postgres:
    image: postgres:18.1
    container_name: postgres
    profiles: 
      - infra
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql
      - ./docker-entrypoint-initdb.d/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init-multiple-dbs.sql
    restart: unless-stopped

  postgres_documentDB:
    image: ghcr.io/ferretdb/postgres-documentdb:15-0.107.0-ferretdb-2.7.0
    container_name: postgres_documentDB
    profiles:
      - infra
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"
    volumes:
      - ./postgres_documentDB-data:/var/lib/postgresql
    restart: unless-stopped

  ferretdb:
    image: ghcr.io/ferretdb/ferretdb:2.7.0
    container_name: ferretdb
    profiles: 
      - infra
    environment:
      FERRETDB_HANDLER: documentdb
      FERRETDB_POSTGRESQL_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_documentDB:5432/postgres?sslmode=disable
    ports:
      - "27017:27017"
    depends_on:
      - postgres_documentDB
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.2.2-management-alpine
    container_name: rabbitmq
    profiles: 
      - infra
    environment: 
      RABBITMQ_DEFAULT_USER: ${RM_SECURITY_ADMIN_USER}
      RABBITMQ_DEFAULT_PASS: ${RM_SECURITY_ADMIN_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes: 
      - ./rabbitmq_data:/var/lib/rabbitmq 
      - ./rabbitmq_logs:/var/log/rabbitmq
    restart: unless-stopped

  consul:
    image: hashicorp/consul:1.22
    container_name: consul
    profiles: 
      - infra
    command: agent -server -bootstrap -ui -client=0.0.0.0
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    restart: unless-stopped

  ai-migrations:
    image: ghcr.io/gopikrishnanrmg/ai-service:latest
    container_name: ai-migrations
    profiles: 
      - infra
    command: alembic upgrade head
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${AI_DB_NAME}
    depends_on:
      postgres:
        condition: service_started
    restart: "no"

  config-server:
    image: ghcr.io/gopikrishnanrmg/config-server:latest
    container_name: config-server
    profiles: 
      - services
    depends_on:
      - consul
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    ports:
      - "8888:8888"
    healthcheck: 
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 5s 
      timeout: 3s 
      retries: 10
    restart: unless-stopped

  analytics-server:
    image: ghcr.io/gopikrishnanrmg/analytics-server:latest
    container_name: analytics-server
    profiles: 
      - services
    depends_on:
      config-server:
        condition: service_healthy
      consul:
        condition: service_started
      ferretdb:
        condition: service_started
    environment:
      CONFIG_SERVER_HOST: config-server
      CONFIG_SERVER_PORT: 8888
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      MONGODB_URI: mongodb://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ferretdb:27017/analytics?authSource=admin
    ports:
      - "8886:8886"
    healthcheck: 
      test: ["CMD", "curl", "-f", "http://localhost:8886/actuator/health"]
      interval: 5s 
      timeout: 3s 
      retries: 10
    restart: unless-stopped

  portfolio-service:
    image: ghcr.io/gopikrishnanrmg/portfolio-service:latest
    container_name: portfolio-service
    profiles: 
      - services
    depends_on:
      config-server:
        condition: service_healthy
      consul:
        condition: service_started
      postgres:
        condition: service_started
    environment:
      CONFIG_SERVER_HOST: config-server
      CONFIG_SERVER_PORT: 8888
      DEV_HOST: ${DEV_HOST}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
    ports:
      - "8889:8889"
    restart: unless-stopped

  api-gateway:
    image: ghcr.io/gopikrishnanrmg/api-gateway:latest
    container_name: api-gateway
    profiles: 
      - services
    depends_on:
      config-server:
        condition: service_healthy
      consul:
        condition: service_started
    environment:
      CONFIG_SERVER_HOST: config-server
      CONFIG_SERVER_PORT: 8888
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    ports:
      - "8887:8887"
    healthcheck: 
      test: ["CMD", "curl", "-f", "http://localhost:8887/actuator/health"]
    restart: unless-stopped
    
  ai-service:
    image: ghcr.io/gopikrishnanrmg/ai-service:latest
    container_name: ai-service
    profiles: 
      - services
    depends_on:
      consul:
        condition: service_started
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      SERVICE_NAME: ai-service
      SERVICE_PORT: 8885
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${AI_DB_NAME}
      ENABLE_CONSUL_REGISTRATION: ${ENABLE_CONSUL_REGISTRATION}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      LLM_API_KEY: ${LLM_API_KEY}
      MODEL_NAME: ${MODEL_NAME}
      API_SERVICE_NAME: ${API_SERVICE_NAME}
      MCP_URL: ${MCP_URL}
    ports:
      - "8885:8885"
    healthcheck: 
      test: ["CMD", "curl", "-f", "http://localhost:8885/actuator/health"]
    restart: unless-stopped

  notification-service:
    image: ghcr.io/gopikrishnanrmg/notification-service:latest
    container_name: notification-service
    profiles: 
      - services
    depends_on:
      consul:
        condition: service_started
    environment:
      CONFIG_SERVER_HOST: config-server
      CONFIG_SERVER_PORT: 8888
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: ${RM_SECURITY_ADMIN_USER}
      RABBIT_PASSWORD: ${RM_SECURITY_ADMIN_PASSWORD}
      EXCHANGE: ${EXCHANGE}
      ROUTING_KEY: ${ROUTING_KEY}
      QUEUE: ${QUEUE}
      BOT_TOKEN: ${BOT_TOKEN}
      CHAT_ID: ${CHAT_ID}
      SESSION_SALT: ${SESSION_SALT}
    ports:
      - "8883:8883"
    healthcheck: 
      test: ["CMD", "curl", "-f", "http://localhost:8883/actuator/health"]
    restart: unless-stopped

  mcp-server:
    image: ghcr.io/gopikrishnanrmg/mcp-server:latest
    container_name: mcp-server
    profiles:
      - services
    depends_on:
      consul:
        condition: service_started
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      SERVICE_NAME: mcp-server
      SERVICE_PORT: 8884
      ENABLE_CONSUL_REGISTRATION: ${ENABLE_CONSUL_REGISTRATION}
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: ${RM_SECURITY_ADMIN_USER}
      RABBIT_PASSWORD: ${RM_SECURITY_ADMIN_PASSWORD}
      EXCHANGE: ${EXCHANGE}
      ROUTING_KEY: ${ROUTING_KEY}
      QUEUE: ${QUEUE}
    ports:
      - "8884:8884"
    healthcheck: 
      test: ["CMD", "curl", "-f", "http://localhost:8884/actuator/health"]
    restart: unless-stopped

  portfolio-frontend:
    image: ghcr.io/gopikrishnanrmg/portfolio-frontend:latest
    container_name: portfolio-frontend
    profiles: 
      - services
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      API_BASE_URL: http://localhost:8887
    ports:
      - "5173:80"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.8.1
    container_name: prometheus
    profiles: 
      - infra
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerts.yml:/etc/prometheus/alerts.yml
      - ./data:/prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.10.2
    container_name: node-exporter
    profiles: 
      - infra
    ports:
      - "9100:9100"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.4.0-20321528496-ubuntu
    container_name: grafana
    profiles: 
      - infra
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=haohanyang-mongodb-datasource
    entrypoint:
    - sh
    - -c
    - |
      set -e
      grafana cli --pluginUrl https://github.com/haohanyang/mongodb-datasource/releases/download/v${MONGO_DRIVER_VERSION}/haohanyang-mongodb-datasource-${MONGO_DRIVER_VERSION}.zip plugins install haohanyang-mongodb-datasource
      echo "Starting Grafana…"
      /run.sh
    volumes:
      - ./grafana-data:/var/lib/grafana
    restart: unless-stopped
