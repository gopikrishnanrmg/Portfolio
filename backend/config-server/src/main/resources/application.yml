server:
  port: 8888

spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
          uri: https://github.com/gopikrishnanrmg/portfolio-config-repo
          default-label: master

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,gateway
  endpoint:
    health:
      show-details: always