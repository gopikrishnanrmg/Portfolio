spring:
  application:
    name: portfolio-service

  cloud:
    config:
      uri: http://${CONFIG_SERVER_HOST}:${CONFIG_SERVER_PORT}
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        enabled: true
        register: true
  config:
    import: "optional:configserver:"
