server:
  port: 0

spring:
  application:
    name: api-gateway-test

  cloud:
    config:
      enabled: false
      import-check.enabled: false
    consul:
      enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: mock-service
              uri: http://localhost:9999
              predicates:
                - Path=/mock/**
              filters:
                - StripPrefix=1
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns:
                  - "*"
                allowed-methods:
                  - GET
                  - POST
                  - OPTIONS
                allowed-headers:
                  - "*"
                allow-credentials: true

management:
  endpoints:
    web:
      exposure:
        include: health,gateway
